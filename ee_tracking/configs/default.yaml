env:
  control_hz: 50.0
  episode_seconds: 6.0
  randomize_trajectory: true
  trajectory_pool: ["moving_target"]   # focus on the hard case; add others once residual beats IK here
  residual_scale: 0.05                 # was 0.4 — trim, don't compete with IK
  use_residual: true
  w_pos: 5.0                           # L1 pos error (m) — dominant term, ~-0.15/step at 30mm
  w_vel: 0.1
  w_residual: 0.5                      # soft constraint (~10% of pos signal at 30mm)
  w_jerk: 0.001                        # regulariser only — was equal to pos term, too strong
  w_smooth: 0.05
  w_delta_pos: 0.0                     # off — too noisy vs slow random walk
  w_bonus: 0.0                         # off — was 55x larger than pos term, killed gradient
  bonus_sharpness: 0.0
  fail_pos_err: 0.30
  lookahead_horizon: 5
  lookahead_dt: 0.10
  disturbance:
    obs_pos_noise: 0.005               # 5mm — enough to matter, not so much it drowns signal
    obs_jnt_noise: 0.002
    act_delay: 1                       # 1 step = 20ms

train:
  total_timesteps: 1_500_000
  n_envs: 10
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  seed: 0
