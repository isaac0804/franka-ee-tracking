env:
  control_hz: 50.0
  episode_seconds: 6.0
  randomize_trajectory: true
  trajectory_pool: ["moving_target"]   # focus on the hard case; add others once residual beats IK here
  residual_scale: 0.05                 # rad/s — residual trims IK, doesn't compete with it
  use_residual: true
  w_pos: 5.0                           # L1 pos error (m) — dominant term
  w_vel: 0.1
  w_residual: 0.5                      # soft constraint keeping corrections small
  w_jerk: 0.001
  w_smooth: 0.05
  w_delta_pos: 0.0
  w_bonus: 0.0
  bonus_sharpness: 0.0
  fail_pos_err: 0.30
  lookahead_horizon: 5                 # future target positions in obs; covers delay window (5 steps = 100ms)
  lookahead_dt: 0.10                   # spacing between lookahead samples (s)
  action_filter_hz: 2.0               # 2nd-order Butterworth on policy output
  disturbance:
    obs_pos_noise: 0.005               # 5mm — realistic EE measurement noise
    obs_jnt_noise: 0.002
    cmd_delay: 5                       # 5 steps = 100ms total pipeline delay (IK + residual, equal footing)
                                       # IK cannot compensate without prediction; policy can via lookahead

train:
  total_timesteps: 1_500_000
  n_envs: 10
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  seed: 0
