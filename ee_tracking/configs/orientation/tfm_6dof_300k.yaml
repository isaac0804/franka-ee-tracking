# 6-DoF orientation tracking — 300k sanity check
# Mixed pool: tilted_circle + look_at + random_walk_6dof
# Transformer: same no-xattn architecture, wider slot tokens (14-D vs 10-D)
# Expected training time: ~10-12 min (n_envs=20)
#
# Obs: 141-D  = state(40) + fine(35) + coarse(28) + cmd(35) + onehot(3)
# Slot token: fine[i](pos(3)+quat(4)=7D) ‖ cmd[i](7D) = 14D → d_model=64

env:
  env_class: FrankaTracking6DoFEnv
  trajectory_pool: ["tilted_circle", "look_at", "random_walk_6dof"]
  episode_seconds: 8.0
  residual_scale: 0.12
  use_residual: true

  # reward weights
  w_pos: 5.0
  w_ori: 2.0
  w_vel: 0.1
  w_residual: 0.087
  w_jerk: 0.0
  w_smooth: 0.0
  w_delta_pos: 0.0
  w_bonus: 0.0
  bonus_sharpness: 0.0

  # 6-DoF IK gain
  kp_ori: 3.0

  fail_pos_err: 0.30
  lookahead_horizon: 5
  lookahead_dt: 0.02
  lookahead_coarse_horizon: 4
  lookahead_coarse_dt: 0.10
  action_filter_hz: 0.0

  disturbance:
    obs_pos_noise: 0.005
    obs_jnt_noise: 0.002
    cmd_delay: 5

train:
  total_timesteps: 300_000
  n_envs: 20
  seed: 42

  policy: "DelayTransformerPolicy"
  policy_kwargs:
    d_model: 64
    nhead: 4
    n_enc_layers: 2
    n_xattn_layers: 1
    actor_arch: [256, 256]
    critic_arch: [256, 256, 256]
    # sequence dims
    n_fine: 5
    n_coarse: 4
    n_cmd: 5
    # 6-DoF obs layout — MUST match franka_tracking_6dof_env.py
    fine_dim: 7          # pos(3) + quat(4) per fine step
    coarse_dim: 7        # pos(3) + quat(4) per coarse step
    robot_state_dim: 40  # 30 (pos-only) + 10 (ee_quat+ori_err+angvel)
    # architecture flags
    use_pos_embed: true
    use_cross_attn: false   # no cross-attn — ablation B result holds for 6-DoF too
    pair_tokens: true
    optimizer_kwargs:
      weight_decay: 0.0001

  learning_rate: 0.001
  lr_final: 0.0001
  lr_schedule: "cosine"
  n_steps: 2048
  batch_size: 512
  n_epochs: 5
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.3
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  delay_aware_gae: false
