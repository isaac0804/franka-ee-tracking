# 6-DoF orientation tracking — 300k, full 5-task pool, residual_scale=0.40
#
# Experiment B: larger residual scale — test whether 0.12 was a bottleneck.
# residual_scale=0.40 matches the EnvConfig class default (intentionally larger
# than the position champion sweep winner to give the policy more headroom on
# the harder 6-DoF task).
#
# Compare against: tfm_6dof_5task_scale012_300k (Experiment A, same pool, lower scale)
# Key question: does the policy learn better corrections with more headroom,
# or does roughness increase without benefit?
#
# w_residual scaled proportionally: 0.087 × (0.4/0.12)² × 0.33 ≈ 0.04
# (softer penalty so the larger scale doesn't get immediately squeezed out)
#
# Obs: 143-D = state(40) + fine(35) + coarse(28) + cmd(35) + onehot(5)

env:
  env_class: FrankaTracking6DoFEnv
  trajectory_pool:
    - tilted_circle
    - look_at
    - upright_constraint
    - rotating_grasp
    - random_walk_6dof
  episode_seconds: 8.0
  residual_scale: 0.40          # 3.3× larger — test if policy is scale-limited
  use_residual: true

  w_pos: 5.0
  w_ori: 2.0
  w_vel: 0.1
  w_residual: 0.04              # softer penalty to match effective regularisation
  w_jerk: 0.0
  w_smooth: 0.0
  w_delta_pos: 0.0
  w_bonus: 0.0
  bonus_sharpness: 0.0

  kp_ori: 3.0
  fail_pos_err: 0.30
  lookahead_horizon: 5
  lookahead_dt: 0.02
  lookahead_coarse_horizon: 4
  lookahead_coarse_dt: 0.10
  action_filter_hz: 0.0

  disturbance:
    obs_pos_noise: 0.005
    obs_jnt_noise: 0.002
    cmd_delay: 5

train:
  total_timesteps: 300_000
  n_envs: 20
  seed: 42

  policy: DelayTransformerPolicy
  policy_kwargs:
    d_model: 64
    nhead: 4
    n_enc_layers: 2
    n_xattn_layers: 1
    actor_arch: [256, 256]
    critic_arch: [256, 256, 256]
    n_fine: 5
    n_coarse: 4
    n_cmd: 5
    fine_dim: 7
    coarse_dim: 7
    robot_state_dim: 40
    use_pos_embed: true
    use_cross_attn: false
    pair_tokens: true
    optimizer_kwargs:
      weight_decay: 0.0001

  learning_rate: 0.001
  lr_final: 0.0001
  lr_schedule: cosine
  n_steps: 2048
  batch_size: 512
  n_epochs: 5
  gamma: 0.97
  gae_lambda: 0.95
  clip_range: 0.3
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  delay_aware_gae: false
